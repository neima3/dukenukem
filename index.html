<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="description" content="Rex Brutus: Alien Apocalypse — an original retro side-scrolling action shooter." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2305060a'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='bold' text-anchor='middle' fill='%23ff2d6a'%3ER%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <title>REX BRUTUS: Alien Apocalypse</title>
    <style>
      :root {
        --neon-pink: #ff2d6a;
        --neon-yellow: #ffcc33;
        --neon-cyan: #33ddff;
        --bg: #05060a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden;
        font-family: 'VT323', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        color: #e8e8f0;
        -webkit-font-smoothing: none;
      }
      #game {
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        position: relative;
        background:
          radial-gradient(120% 90% at 50% 10%, #1a0a1a 0%, var(--bg) 55%, #000 100%);
      }
      canvas {
        image-rendering: pixelated; image-rendering: crisp-edges;
        touch-action: none;
        /* subtle glow so the pixel art pops against the bezel */
        filter: drop-shadow(0 0 18px rgba(255, 45, 106, 0.12)) saturate(1.08) contrast(1.05);
      }

      /* ---- CRT post-FX overlay (purely decorative, non-interactive) ---- */
      .crt {
        position: fixed; inset: 0; pointer-events: none; z-index: 50;
      }
      .crt::before {              /* scanlines */
        content: ''; position: absolute; inset: 0;
        background: repeating-linear-gradient(
          to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
        mix-blend-mode: multiply;
      }
      .crt::after {               /* vignette + faint glow */
        content: ''; position: absolute; inset: 0;
        background:
          radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%),
          linear-gradient(rgba(255, 45, 106, 0.025), rgba(51, 221, 255, 0.025));
        box-shadow: inset 0 0 140px rgba(0,0,0,0.7);
      }

      #boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        color: var(--neon-pink); background: var(--bg); z-index: 60;
        font-family: 'Press Start 2P', monospace; font-size: 12px; letter-spacing: 2px;
        text-shadow: 0 0 12px rgba(255,45,106,0.7);
        animation: pulse 1.1s ease-in-out infinite;
      }
      #boot .bar {
        width: 220px; height: 8px; background: #1a1a2a; border: 2px solid #2a2a3a;
        overflow: hidden; position: relative;
      }
      #boot .bar::after {
        content: ''; position: absolute; inset: 0; width: 40%;
        background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
        animation: slide 1s linear infinite;
      }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .65; } }
      @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(420%); } }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="boot">
        <div>REX BRUTUS</div>
        <div class="bar"></div>
        <div style="font-size:9px;color:#555577">LOADING…</div>
      </div>
    </div>
    <div class="crt" aria-hidden="true"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
